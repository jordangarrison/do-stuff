# Deliberately disabled linters (noise > signal on a CLI of this shape):
#   gochecknoinits, exhaustruct, gochecknoglobals, nlreturn, wsl
version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

formatters:
  enable:
    - gofumpt
