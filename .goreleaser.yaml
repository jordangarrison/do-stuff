version: 2

project_name: do-stuff

before:
  hooks:
    - go mod tidy

builds:
  - id: ds
    main: ./cmd/ds
    binary: ds
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version=v{{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    # Skills are added to this archive list in v0.1 when skills/ exists.

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactoring
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 3
    - title: Tests
      regexp: '^.*?test(\(.+\))??!?:.+$'
      order: 4
    - title: Build
      regexp: '^.*?build(\(.+\))??!?:.+$'
      order: 5
    - title: CI
      regexp: '^.*?ci(\(.+\))??!?:.+$'
      order: 6
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 7
    - title: Chores
      regexp: '^.*?chore(\(.+\))??!?:.+$'
      order: 8
    - title: Others
      order: 999
